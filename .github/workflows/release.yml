name: Release (Reusable)

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: Version to release (e.g. 0.1.0 or v0.1.0)
      base_tag:
        required: true
        type: string
        description: Tag to use as the starting point for release notes (e.g. v0.1.0)
      release:
        required: false
        type: boolean
        description: If true, publish release and PyPI; if false, create draft and skip PyPI
        default: false
      pre_release:
        description: "Whether this is a pre-release build"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  cli-release:
    name: GitHub Release (CLI binaries)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
          pattern: binaries-*
          merge-multiple: true
      
      - name: Download Wheel Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Available Artifacts
        run: |
          echo "Contents of ./binaries:"
          ls -lah ./binaries
          echo "Contents of ./wheels:"
          ls -lah ./wheels

      - name: Create GitHub Release and Upload Assets
        if: ${{ inputs.release }}
        run: |
          TAG="${{ startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version) }}"
          PRERELEASE_FLAG="${{ inputs.pre_release && '--prerelease' || '' }}"
          LATEST_FLAG="${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && '' || '--latest=false' }}"
          if [ -n "${{ vars.RELEASE_ASSETS }}" ]; then
            ASSETS="${{ vars.RELEASE_ASSETS }}"
          else
            ASSETS="./binaries/cli-* ./wheels/*cp313-cp313*"
          fi
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --generate-notes \
            --notes-start-tag "${{ inputs.base_tag }}" \
            $PRERELEASE_FLAG \
            $LATEST_FLAG \
            $ASSETS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi-publish:
    name: Publish Wheels to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download built wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true

      - name: Collect Wheels and sdist
        run: |
          mkdir -p dist_collected
          find dist/ -name '*.whl' -exec cp {} dist_collected/ \;
          find dist/ -name '*.tar.gz' -exec cp {} dist_collected/ \;

          echo "Files that will be published to PyPI:"
          ls -lah dist_collected

      - name: Publish release distributions to PyPI
        if: ${{ inputs.release && vars.PYPI_PUBLISH == 'true' }}
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc
        with:
          packages-dir: dist_collected/
