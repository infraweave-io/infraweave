name: Build Docker Image (Reusable)

on:
  workflow_call:
    secrets: {}
    inputs:
      version:
        required: true
        type: string
        description: Version of the CLI to build (e.g., 0.1.0)
      push:
        required: false
        type: boolean
        description: Should images be pushed to ghcr.io
        default: false
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
        description: Version of the CLI to build (e.g., 0.1.0)
        default: 0.0.0-manual
      push:
        required: false
        type: boolean
        description: Should images be pushed to ghcr.io
        default: false

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_REPO: ${{ github.repository }}
  DOCKER_BUILD_SUMMARY: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate required binaries
        env:
          DOCKER_IMAGES: ${{ vars.DOCKER_IMAGES }}
          TARGETS: ${{ vars.TARGETS }}
          BINARIES: ${{ vars.BINARIES }}
        run: .github/scripts/docker_validate-binaries.sh
        shell: bash
      
      - name: Setup build matrix
        id: set-matrix
        env:
          DOCKER_IMAGES: ${{ vars.DOCKER_IMAGES }}
        run: .github/scripts/docker_setup-build-matrix.sh
        shell: bash

  build:
    name: Build images for ${{ matrix.bin }}
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix: 
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v6
        with:
          path: binaries
          pattern: binaries-*
          merge-multiple: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
          cache-image: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-binary: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Sanitize version for Docker tag
        run: |
          SANITIZED_VERSION="${{ inputs.version }}"
          SANITIZED_VERSION=${SANITIZED_VERSION//+/-}
          echo "SANITIZED_VERSION=${SANITIZED_VERSION}" >> $GITHUB_ENV

      - name: "Build with bake, push: ${{ inputs.push }}"
        uses: docker/bake-action@v6
        with:
          source: .
          files: ${{ matrix.bake-file }}
          push: ${{ inputs.push }}
          set: |
            *.platform=${{ join(matrix.platforms, ',') }}
        env:
          REGISTRY: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}
          VERSION: ${{ env.SANITIZED_VERSION }}
